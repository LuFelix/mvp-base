<div class="container">
  <mat-card class="expired-card">
    <mat-card-header class="card-header">
      <div class="icon-area">
        <mat-icon color="warn">error_outline</mat-icon>
      </div>
    </mat-card-header>

    <mat-card-content>
      <h1>Convite Expirado</h1>
      <p>
        O link de convite que você utilizou não é mais válido ou já foi usado.
        Por favor, solicite um novo convite ao administrador do sistema.
      </p>
    </mat-card-content>

    <mat-card-actions>
      <button mat-raised-button color="primary" routerLink="/login">
        Voltar para o Login
      </button>
    </mat-card-actions>
  </mat-card>
</div>
